name: Data Pipeline

# 정기 실행은 docker-compose scheduler 서비스가 담당.
# 긴급 수동 실행이 필요할 때만 workflow_dispatch를 사용.
on:
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Run batch sync on home server
        uses: appleboy/ssh-action@v1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
          GEMINI_API_KEY4: ${{ secrets.GEMINI_API_KEY4 }}
          GEMINI_API_KEY5: ${{ secrets.GEMINI_API_KEY5 }}
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
          WORK24_API_KEY: ${{ secrets.WORK24_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 50m
          envs: GEMINI_API_KEY,GEMINI_API_KEY2,GEMINI_API_KEY3,GEMINI_API_KEY4,GEMINI_API_KEY5,SARAMIN_API_KEY,WORK24_API_KEY
          script: |
            export GIT_SSH_COMMAND="ssh -F ~/.ssh/config"
            cd ~/job-market-insight

            git pull origin main

            # Combine Gemini keys (comma-separated for round-robin rotation)
            GEMINI_KEYS="${GEMINI_API_KEY}"
            [ -n "${GEMINI_API_KEY2}" ] && GEMINI_KEYS="${GEMINI_KEYS},${GEMINI_API_KEY2}"
            [ -n "${GEMINI_API_KEY3}" ] && GEMINI_KEYS="${GEMINI_KEYS},${GEMINI_API_KEY3}"
            [ -n "${GEMINI_API_KEY4}" ] && GEMINI_KEYS="${GEMINI_KEYS},${GEMINI_API_KEY4}"
            [ -n "${GEMINI_API_KEY5}" ] && GEMINI_KEYS="${GEMINI_KEYS},${GEMINI_API_KEY5}"

            # Write secrets to .env
            cat > .env <<ENVEOF
            GEMINI_API_KEY=${GEMINI_KEYS}
            SARAMIN_API_KEY=${SARAMIN_API_KEY}
            WORK24_API_KEY=${WORK24_API_KEY}
            ENVEOF
            sed -i 's/^            //' .env

            # 1) Rebuild & start core services
            docker compose up -d --build postgres api frontend

            # 2) Run batch sync (Gemini API for LLM summarization)
            docker compose --profile batch build batch
            docker compose --profile batch run --rm batch sync-all

            # 3) Verify LLM summarization in logs
            docker compose --profile batch logs batch 2>&1 | grep -q "LLM 요약 생성 완료" \
              && echo "SUCCESS: LLM summarization verified" \
              || echo "WARNING: LLM summarization message not found in logs"
