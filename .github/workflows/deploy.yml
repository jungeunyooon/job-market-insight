name: Deploy to Home Server

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
          GEMINI_API_KEY4: ${{ secrets.GEMINI_API_KEY4 }}
          GEMINI_API_KEY5: ${{ secrets.GEMINI_API_KEY5 }}
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
          WORK24_API_KEY: ${{ secrets.WORK24_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 10m
          envs: GEMINI_API_KEY,GEMINI_API_KEY2,GEMINI_API_KEY3,GEMINI_API_KEY4,GEMINI_API_KEY5,SARAMIN_API_KEY,WORK24_API_KEY
          script: |
            export GIT_SSH_COMMAND="ssh -F ~/.ssh/config"
            cd ~/job-market-insight

            # Pull latest changes
            git pull origin main

            # Combine Gemini keys (comma-separated for round-robin rotation)
            GEMINI_KEYS="${GEMINI_API_KEY}"
            [ -n "${GEMINI_API_KEY2}" ] && GEMINI_KEYS="${GEMINI_KEYS},${GEMINI_API_KEY2}"
            [ -n "${GEMINI_API_KEY3}" ] && GEMINI_KEYS="${GEMINI_KEYS},${GEMINI_API_KEY3}"
            [ -n "${GEMINI_API_KEY4}" ] && GEMINI_KEYS="${GEMINI_KEYS},${GEMINI_API_KEY4}"
            [ -n "${GEMINI_API_KEY5}" ] && GEMINI_KEYS="${GEMINI_KEYS},${GEMINI_API_KEY5}"

            # Write secrets to .env (docker compose reads this)
            echo "GEMINI_API_KEY=${GEMINI_KEYS}" > .env
            echo "SARAMIN_API_KEY=${SARAMIN_API_KEY}" >> .env
            echo "WORK24_API_KEY=${WORK24_API_KEY}" >> .env
            echo "Keys in .env: $(grep -c '=' .env) lines"

            # Build and restart services (force-recreate to pick up new .env)
            docker compose build api frontend scheduler
            docker compose up -d --force-recreate api frontend scheduler

            # Wait for API container healthcheck
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              status=$(docker inspect --format '{{.State.Health.Status}}' devpulse-api 2>/dev/null || echo "unknown")
              if [ "$status" = "healthy" ]; then
                echo "API is healthy!"
                break
              fi
              if [ "$status" = "unhealthy" ] || [ $i -eq 30 ]; then
                echo "API health check timed out (status: $status)"
                docker compose logs api --tail=50
                exit 1
              fi
              sleep 5
            done

            # Verify scheduler is running (not crash-looping)
            sleep 5
            scheduler_status=$(docker inspect --format '{{.State.Status}}' devpulse-scheduler 2>/dev/null || echo "unknown")
            if [ "$scheduler_status" != "running" ]; then
              echo "WARNING: scheduler status=$scheduler_status"
              docker compose logs scheduler --tail=30
            else
              echo "Scheduler is running."
            fi

            # Cleanup old images
            docker image prune -f
