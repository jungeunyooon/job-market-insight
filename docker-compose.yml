services:
  postgres:
    image: postgres:16-alpine
    container_name: devpulse-db
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse1234
    volumes:
      - devpulse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse -d devpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devpulse

  api:
    build: ./api
    container_name: devpulse-api
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - traefik
      - devpulse
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devpulse-api.rule=Host(`job.jungeun.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.devpulse-api.entrypoints=websecure"
      - "traefik.http.routers.devpulse-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.devpulse-api.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik"

  frontend:
    build: ./frontend
    container_name: devpulse-fe
    depends_on:
      - api
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devpulse-fe.rule=Host(`job.jungeun.cloud`)"
      - "traefik.http.routers.devpulse-fe.entrypoints=websecure"
      - "traefik.http.routers.devpulse-fe.tls.certresolver=letsencrypt"
      - "traefik.http.services.devpulse-fe.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"

  batch:
    build:
      context: .
      dockerfile: batch/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: devpulse
      DB_USER: devpulse
      DB_PASSWORD: devpulse1234
      OLLAMA_HOST: http://ollama:11434
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SARAMIN_API_KEY: ${SARAMIN_API_KEY:-}
      WORK24_API_KEY: ${WORK24_API_KEY:-}
      BLOG_FETCH_FULL_CONTENT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false
    networks:
      - devpulse
    profiles:
      - batch

  scheduler:
    build:
      context: .
      dockerfile: batch/Dockerfile
    container_name: devpulse-scheduler
    command: ["python", "scheduler.py", "--run-now"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: devpulse
      DB_USER: devpulse
      DB_PASSWORD: devpulse1234
      OLLAMA_HOST: http://ollama:11434
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SARAMIN_API_KEY: ${SARAMIN_API_KEY:-}
      WORK24_API_KEY: ${WORK24_API_KEY:-}
      BLOG_FETCH_FULL_CONTENT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped
    networks:
      - devpulse

  ollama:
    image: ollama/ollama:latest
    container_name: devpulse-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - traefik
      - devpulse
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ai.jungeun.cloud`)"
      - "traefik.http.routers.ollama.entrypoints=websecure"
      - "traefik.http.routers.ollama.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ollama.middlewares=ollama-auth"
      - "traefik.http.middlewares.ollama-auth.basicauth.users=${OLLAMA_BASIC_AUTH}"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true
  devpulse:

volumes:
  devpulse-data:
  ollama_data:
