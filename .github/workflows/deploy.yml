name: Deploy to Home Server

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'batch/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export GIT_SSH_COMMAND="ssh -F ~/.ssh/config"
            cd ~/job-market-insight

            # Pull latest changes
            git pull origin main

            # Build and restart services
            docker compose build
            docker compose up -d

            # Wait for API container healthcheck status
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              status=$(docker inspect --format '{{.State.Health.Status}}' devpulse-api 2>/dev/null || echo "unknown")
              if [ "$status" = "healthy" ]; then
                echo "API is healthy!"
                break
              fi
              if [ "$status" = "unhealthy" ] || [ $i -eq 30 ]; then
                echo "API health check timed out (status: $status)"
                docker compose logs api --tail=100
                exit 1
              fi
              sleep 5
            done

            # Cleanup old images
            docker image prune -f
