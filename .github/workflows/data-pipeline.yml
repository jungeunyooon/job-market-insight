name: Data Pipeline

# cron 스케줄 제거: 정기 실행은 docker-compose scheduler 서비스가 담당한다.
# 긴급 수동 실행이 필요할 때만 workflow_dispatch를 사용한다.
on:
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Run batch sync on home server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 50m
          script: |
            export GIT_SSH_COMMAND="ssh -F ~/.ssh/config"
            cd ~/job-market-insight

            git pull origin main

            # 1) Rebuild & start all services
            docker compose up -d --build postgres ollama api frontend

            # 2) Pull model (skips if already cached)
            echo "Pulling gemma3:4b model..."
            docker exec devpulse-ollama ollama pull gemma3:4b

            # 3) Ollama health check (ollama list로 모델 확인)
            echo "Checking Ollama health..."
            docker exec devpulse-ollama ollama list \
              || { echo "ERROR: Ollama health check failed"; exit 1; }

            # 4) Ollama external access check (Traefik)
            echo "Checking Ollama health (external via Traefik)..."
            curl -sf --max-time 10 https://ai.jungeun.cloud/api/tags \
              || echo "WARNING: External Ollama check failed (Traefik may not be ready)"

            # 5) Run batch sync
            docker compose --profile batch build batch
            docker compose --profile batch run --rm batch sync-all

            # 6) Verify LLM summarization in logs
            docker compose --profile batch logs batch 2>&1 | grep -q "LLM 요약 생성 완료" \
              && echo "SUCCESS: LLM summarization verified" \
              || echo "WARNING: LLM summarization message not found in logs"
