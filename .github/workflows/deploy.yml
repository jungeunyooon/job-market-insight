name: Deploy to Home Server

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 10m
          envs: GEMINI_API_KEY,SARAMIN_API_KEY,WORK24_API_KEY
          script: |
            export GIT_SSH_COMMAND="ssh -F ~/.ssh/config"
            cd ~/job-market-insight

            # Pull latest changes
            git pull origin main

            # Write secrets to .env (docker compose reads this)
            cat > .env <<ENVEOF
            GEMINI_API_KEY=${GEMINI_API_KEY}
            SARAMIN_API_KEY=${SARAMIN_API_KEY}
            WORK24_API_KEY=${WORK24_API_KEY}
            ENVEOF
            sed -i 's/^            //' .env

            # Build and restart services (scheduler uses batch Dockerfile)
            docker compose build api frontend scheduler
            docker compose up -d api frontend scheduler

            # Wait for API container healthcheck
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              status=$(docker inspect --format '{{.State.Health.Status}}' devpulse-api 2>/dev/null || echo "unknown")
              if [ "$status" = "healthy" ]; then
                echo "API is healthy!"
                break
              fi
              if [ "$status" = "unhealthy" ] || [ $i -eq 30 ]; then
                echo "API health check timed out (status: $status)"
                docker compose logs api --tail=50
                exit 1
              fi
              sleep 5
            done

            # Verify scheduler is running (not crash-looping)
            sleep 5
            scheduler_status=$(docker inspect --format '{{.State.Status}}' devpulse-scheduler 2>/dev/null || echo "unknown")
            if [ "$scheduler_status" != "running" ]; then
              echo "WARNING: scheduler status=$scheduler_status"
              docker compose logs scheduler --tail=30
            else
              echo "Scheduler is running."
            fi

            # Cleanup old images
            docker image prune -f
